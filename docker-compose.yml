services:
  postgres:
    image: postgres:16-alpine
    container_name: appvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appvault
      POSTGRES_PASSWORD: appvault
      POSTGRES_DB: appvault
    ports:
      - "5432:5432"
    volumes:
      - appvault_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appvault -d appvault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  appvault_postgres:
